name: pas_app_new
description: Pagan Appointment System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '^3.4.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1

  # Firebase - Downgraded to Dart 3.4 compatible versions
  firebase_core: ^3.15.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  image_picker: ^1.0.5

  # Notifications
  flutter_local_notifications: ^17.2.0

  # Google Maps - Downgraded to Dart 3.4 compatible version
  google_maps_flutter: ^2.10.1

  # URL launcher
  url_launcher: ^6.2.0

  # UI & utilities
  font_awesome_flutter: ^10.7.0  # Downgraded
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints compatible with Dart 3.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/