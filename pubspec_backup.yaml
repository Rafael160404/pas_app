name: pas_app_fresh
description: Pagan Appointment System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^17.2.4
  
  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  intl: ^0.20.2
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  location: ^5.0.3
  url_launcher: ^6.2.1
  
  # API
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/